version: "3.8"

services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    # Do not publish the MongoDB port to the host by default to avoid
    # conflicts with a locally installed MongoDB. Other containers can
    # still reach the database on port 27017 through the Docker network.
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MONGO_CONNECTION_STRING=mongodb://mongo:27017
    depends_on:
      - mongo
    # Do not publish the app port to the host by default to avoid
    # conflicts with local services. The app remains reachable from
    # other services on the compose network as `http://app:8000`.
    # Publish the app port to the host so you can access the OpenAPI docs
    # at http://localhost:8000/docs. If this conflicts with a local service,
    # remove the `ports` mapping.
    expose:
      - "8000"
    ports:
      - "8000:8000"
    command: ["uvicorn", "examples.demo.api:app", "--host", "0.0.0.0", "--port", "8000"]

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - MONGO_CONNECTION_STRING=mongodb://mongo:27017
    depends_on:
      - mongo
      - app
    entrypoint: ["/bin/bash", "-c", "./scripts/wait_and_test.sh"]
    volumes:
      - ./:/app:ro
    # Keep logs visible when running interactively
    tty: true

volumes:
  mongo_data:
