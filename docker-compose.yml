version: "3.8"

services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MONGO_CONNECTION_STRING=mongodb://mongo:27017
    depends_on:
      - mongo
    ports:
      - "8000:8000"
    command: ["uvicorn", "examples.demo.api:app", "--host", "0.0.0.0", "--port", "8000"]

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - MONGO_CONNECTION_STRING=mongodb://mongo:27017
    depends_on:
      - mongo
    entrypoint: ["pytest", "-v"]
    # Keep logs visible when running interactively
    tty: true

volumes:
  mongo_data:
